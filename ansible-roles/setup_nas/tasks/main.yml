# ansible-playbook setup.yml -u ubuntu --become -K
---
# tasks file for setup_nas
- name: Configure Samba and Tailscale
  # hosts: web_servers
  become: true
  become_user: root
  block:
    - name: Install Samba
      become: true
      become_user: root
      apt:
        name: samba
        state: present
        update_cache: yes
        # cache_valid_time: 0  # Force cache update
    - name: Configure Samba Share
      ansible.builtin.blockinfile:
        path: /etc/samba/smb.conf
        # create: yes
        block: |
          [DevOpsShare]
             comment = Persistent Lab Storage
             path = /srv/storage
             read only = no
             browsable = yes
             guest ok = yes
             force user = ubuntu
    - name: Verify file content immediately
      ansible.builtin.shell: cat /etc/samba/smb.conf
      register: smb_content

    - name: Show the content Ansible sees
      ansible.builtin.debug:
        var: smb_content.stdout_lines
    - name: Restart Samba
      service:
        name: smbd
        state: restarted

