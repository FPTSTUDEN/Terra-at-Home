# ansible-playbook setup.yml -u ubuntu --become --ask-vault-pass
---
# tasks file for setup_nas
- name: Include vault variables first
  include_vars: secrets.yml
  tags: [always]

# --- VHDX SETUP ---
- name: Setup VHDX Storage
  tags: [setup_vhdx]
  block:
    - name: Infrastructure - Wait for Persistent VHDX
      ansible.builtin.command: lsblk -f
      register: disk_output
      until: "'lab_data' in disk_output.stdout"
      retries: 20
      delay: 5
      changed_when: false

    - name: Infrastructure - Mount Persistent Storage
      ansible.posix.mount:
        path: /srv/storage
        src: LABEL=lab_data
        fstype: ext4
        state: mounted

# --- SAMBA INSTALL & SETUP ---
- name: Install Samba
  apt:
    name: [samba, smbclient]
    state: present
    update_cache: yes
  tags: [install_samba]

- name: Configure Samba
  tags: [setup_samba]
  block:
    - name: Configure Samba Share
      ansible.builtin.blockinfile:
        path: /etc/samba/smb.conf
        block: |
          [DevOpsShare]
             path = /srv/storage
             read only = no
             guest ok = yes
             force user = ubuntu

    - name: Create Samba user
      shell: |
        (echo "{{ vault_samba_password }}"; echo "{{ vault_samba_password }}") | smbpasswd -s -a ubuntu
        smbpasswd -e ubuntu
      no_log: true
      notify: Restart Samba

# --- TAILSCALE INSTALL & CLEANUP ---
- name: Install Tailscale
  shell: "curl -fsSL https://tailscale.com/install.sh | sh"
  args:
    creates: /usr/bin/tailscale
  tags: [install_tailscale]

- name: Tailscale API Cleanup and Registration
  tags: [setup_tailscale]
  block:
    - name: Get Tailscale OAuth2 Token
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/oauth/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ vault_ts_client_id }}"
          client_secret: "{{ vault_ts_client_secret }}"
      register: ts_token
      no_log: true

    - name: Remove Existing "devops-lab" Devices via API
      ansible.builtin.shell: |
        devices=$(curl -s -H "Authorization: Bearer {{ ts_token.json.access_token }}" \
          "https://api.tailscale.com/api/v2/tailnet/{{ vault_ts_tailnet }}/devices")
        echo "$devices" | jq -r '.devices[] | select(.name | contains("devops-lab")) | .id' | while read id; do
          curl -s -X DELETE -H "Authorization: Bearer {{ ts_token.json.access_token }}" \
            "https://api.tailscale.com/api/v2/device/$id"
        done
      changed_when: true

    - name: Bring Tailscale Up with Static IP
      command: >
        tailscale up --authkey='{{ vault_ts_client_secret }}' 
        --hostname="devops-lab" 
        --accept-routes --advertise-tags=tag:tds --snat-subnet-routes=false
      # Note: Static IPs (100.118.110.61) are usually assigned via the Admin Console 
      # or by using '--advertise-routes' if this node is a subnet router.
      # no_log: true
