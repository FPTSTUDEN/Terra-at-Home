# ansible-playbook setup.yml -u ubuntu --become --ask-vault-pass
---
# tasks file for setup_nas
- name: Include vault variables first
  include_vars: secrets.yml
- name: Infrastructure - Wait for Persistent VHDX
  ansible.builtin.command: lsblk -f
  register: disk_output
  # This loop runs in the background and won't stop other VM processes
  until: "'lab_data' in disk_output.stdout"
  retries: 20
  delay: 5
  changed_when: false

- name: Infrastructure - Mount Persistent Storage
  ansible.posix.mount:
    path: /srv/storage
    src: LABEL=lab_data
    fstype: ext4
    state: mounted

- name: Permissions - Ensure Ubuntu ownership
  ansible.builtin.file:
    path: /srv/storage
    owner: ubuntu
    group: ubuntu
    mode: '0755'
    recurse: yes
- name: Configure Samba and Tailscale
  # hosts: web_servers
  become: true
  become_user: root
  block:
    - name: Install Samba
      apt:
        name:
          - samba
          - smbclient
        state: present
        update_cache: yes
        # cache_valid_time: 0  # Force cache update
    - name: Configure Samba Share
      ansible.builtin.blockinfile:
        path: /etc/samba/smb.conf
        # create: yes
        block: |
          [DevOpsShare]
             comment = Persistent Lab Storage
             path = /srv/storage
             read only = no
             browsable = yes
             guest ok = yes
             force user = ubuntu
    - name: Verify file content immediately
      ansible.builtin.shell: "cat /etc/samba/smb.conf | tail -8" 
      register: smb_content
    - name: Show the content Ansible sees
      ansible.builtin.debug:
        var: smb_content.stdout_lines
    - name: Create Samba user with password
      shell: |
        (echo "{{ vault_samba_password }}"; echo "{{ vault_samba_password }}") | smbpasswd -s -a ubuntu
      # args:
      #   creates: /var/lib/samba/private/passdb.tdb
      no_log: true
    - name: Enable Samba users
      shell: smbpasswd -e ubuntu
    - name: Restart Samba
      service:
        name: smbd
        state: restarted

    - name: Install Tailscale
      shell: "curl -fsSL https://tailscale.com/install.sh | sh"
      args:
        creates: /usr/bin/tailscale

    - name: Bring Tailscale Up using OAuth
      command: >
        tailscale up --auth-key='{{vault_ts_client_secret}}?ephemeral=false&preauthorized=true' --snat-subnet-routes=false --accept-routes --advertise-tags=tag:tds
        --hostname="devops-lab"
      # no_log is CRITICAL so your secret doesn't leak in the terminal output
      no_log: true